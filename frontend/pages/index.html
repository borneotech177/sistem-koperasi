<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SisKop - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    .gradient-bg {
      background: linear-gradient(135deg, #1E5C2E 0%, #27AE60 50%, #1A4A25 100%);
    }
    .btn-login {
      background: linear-gradient(135deg, #1E5C2E, #27AE60);
      transition: all 0.3s ease;
    }
    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(39,174,96,0.4);
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center 
  justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-6">
      <img src="../assets/logo.png" alt="SisKop"
        class="w-28 h-28 object-contain mx-auto mb-3
        bg-white rounded-2xl p-2 shadow-lg"/>
      <p class="text-green-100 text-sm">
        Sistem Manajemen Koperasi</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl p-8">

      <h2 class="text-gray-800 font-bold text-xl mb-1">
        Selamat Datang</h2>
      <p class="text-gray-400 text-sm mb-6">
        Masuk ke akun Anda untuk melanjutkan</p>

      <!-- Alert -->
      <div id="alert" class="hidden mb-4 p-3 rounded-xl 
        text-sm flex items-center gap-2"></div>

      <div class="space-y-4">

        <!-- Username -->
        <div>
          <label class="text-gray-600 text-sm font-medium 
            mb-1 block">Username</label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-3 
              top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="username" type="text"
              placeholder="Masukkan username"
              class="input pl-10"/>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-gray-600 text-sm font-medium 
            mb-1 block">Password</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3 
              top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input id="password" type="password"
              placeholder="Masukkan password"
              class="input pl-10 pr-12"/>
            <button onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 
              text-gray-400 hover:text-gray-600">
              <i id="eyeIcon" class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <!-- Button -->
        <button onclick="login()" id="btnLogin"
          class="btn-login w-full text-white font-semibold 
          py-3 rounded-xl flex items-center justify-center gap-2">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Masuk</span>
        </button>

      </div>

      <!-- Info -->
      <div class="mt-5 p-3 bg-green-50 rounded-xl">
        <p class="text-green-700 text-xs text-center">
          <i class="fa-solid fa-circle-info mr-1"></i>
          Hubungi Administrator jika lupa password
        </p>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center text-green-100 text-xs mt-5">
      <i class="fa-solid fa-shield-halved mr-1"></i>
      BORNEO-TECH © 2026 — SisKop v1.0.0
    </p>

  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>

  <script>
    // Redirect jika sudah login
    if (Auth.isLoggedIn()) {
      window.location.href = 'dashboard.html'
    }

    async function login() {
      const username = document.getElementById('username')
        .value.trim()
      const password = document.getElementById('password').value
      const btn = document.getElementById('btnLogin')

      if (!username || !password) {
        showAlert('Username dan password wajib diisi!', 'error')
        return
      }

      btn.innerHTML = 
        '<i class="fa-solid fa-spinner fa-spin"></i> <span>Memproses...</span>'
      btn.disabled = true

      try {
        const res = await fetch(`${CONFIG.API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        })
        const data = await res.json()

        if (data.success) {
          showAlert('Login berhasil!', 'success')
          localStorage.setItem('token', data.token)
          localStorage.setItem('user', JSON.stringify(data.user))
          setTimeout(() => {
            window.location.href = 'dashboard.html'
          }, 800)
        } else {
          showAlert(data.message || 'Login gagal!', 'error')
          btn.innerHTML = 
            '<i class="fa-solid fa-right-to-bracket"></i> <span>Masuk</span>'
          btn.disabled = false
        }
      } catch {
        showAlert('Gagal terhubung ke server!', 'error')
        btn.innerHTML = 
          '<i class="fa-solid fa-right-to-bracket"></i> <span>Masuk</span>'
        btn.disabled = false
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert')
      el.className = `mb-4 p-3 rounded-xl text-sm flex 
        items-center gap-2 ${
        type === 'error'
          ? 'bg-red-50 text-red-600 border border-red-200'
          : 'bg-green-50 text-green-600 border border-green-200'
      }`
      el.innerHTML = `
        <i class="fa-solid ${
          type === 'error' 
            ? 'fa-circle-xmark' 
            : 'fa-circle-check'
        }"></i> ${msg}`
      el.classList.remove('hidden')
    }

    function togglePassword() {
      const input = document.getElementById('password')
      const icon = document.getElementById('eyeIcon')
      if (input.type === 'password') {
        input.type = 'text'
        icon.className = 'fa-solid fa-eye-slash text-sm'
      } else {
        input.type = 'password'
        icon.className = 'fa-solid fa-eye text-sm'
      }
    }

    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') login()
    })
  </script>

</body>
</html>
