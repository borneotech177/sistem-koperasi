<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ePOS Toko - SisKop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="../css/style.css"/>
</head>
<body class="bg-gray-50 min-h-screen">

  <div id="sidebar"></div>

  <div class="lg:ml-64 min-h-screen">

    <div id="navbar"></div>

    <main class="p-4 lg:p-8">

      <!-- Header -->
      <div class="flex items-center justify-between mb-6">
        <div>
          <h2 class="text-gray-800 font-bold text-xl">ePOS Toko</h2>
          <p class="text-gray-400 text-sm mt-0.5">
            Transaksi penjualan toko</p>
        </div>
        <div class="flex gap-2">
          <button onclick="showProdukManager()"
            class="btn btn-secondary">
            <i class="fa-solid fa-box"></i>
            Produk
          </button>
        </div>
      </div>

      <div class="lg:grid lg:grid-cols-3 lg:gap-6">

        <!-- Kiri: Produk -->
        <div class="lg:col-span-2">

          <!-- Search -->
          <div class="card p-3 mb-4">
            <div class="relative">
              <i class="fa-solid fa-search absolute left-3 
                top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
              <input id="searchProduk" type="text"
                placeholder="Cari produk..."
                oninput="filterProduk()"
                class="input pl-9"/>
            </div>
          </div>

          <!-- Grid Produk -->
          <div id="gridProduk"
            class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
            <div class="col-span-2 md:col-span-3 card p-6 text-center">
              <i class="fa-solid fa-spinner fa-spin 
                text-gray-300 text-2xl mb-2"></i>
              <p class="text-gray-400 text-sm">Memuat produk...</p>
            </div>
          </div>

        </div>

        <!-- Kanan: Keranjang -->
        <div class="lg:col-span-1">
          <div class="card p-4 lg:sticky lg:top-24">

            <h3 class="font-bold text-gray-800 mb-3 flex 
              items-center gap-2">
              <i class="fa-solid fa-cart-shopping text-green-600"></i>
              Keranjang
              <span id="badgeKeranjang" 
                class="hidden bg-green-600 text-white text-xs 
                w-5 h-5 rounded-full flex items-center 
                justify-center"></span>
            </h3>

            <div id="listKeranjang">
              <div class="text-center py-6">
                <i class="fa-solid fa-cart-shopping 
                  text-gray-200 text-3xl mb-2"></i>
                <p class="text-gray-400 text-sm">
                  Keranjang kosong</p>
              </div>
            </div>

            <div id="sectionTotal" class="hidden">
              <div class="border-t border-gray-100 pt-3 mt-3 
                space-y-2">
                <div class="flex justify-between text-sm">
                  <span class="text-gray-500">Subtotal</span>
                  <span id="subtotal" 
                    class="font-semibold text-gray-800"></span>
                </div>
                <div>
                  <label class="text-gray-500 text-sm 
                    mb-1 block">Metode Bayar</label>
                  <select id="metodeBayar" class="input">
                    <option value="tunai">Tunai</option>
                    <option value="saldo_rfid">Saldo RFID</option>
                    <option value="transfer">Transfer</option>
                  </select>
                </div>
                <button onclick="prosesTransaksi()"
                  id="btnProses"
                  class="btn btn-primary w-full justify-center">
                  <i class="fa-solid fa-check"></i>
                  Proses Transaksi
                </button>
                <button onclick="clearKeranjang()"
                  class="btn btn-secondary w-full justify-center">
                  <i class="fa-solid fa-trash"></i>
                  Kosongkan
                </button>
              </div>
            </div>

          </div>
        </div>

      </div>

    </main>
  </div>

  <!-- Modal Sukses -->
  <div id="modalSukses" class="hidden modal-overlay">
    <div class="modal-box text-center">
      <div class="bg-green-100 w-16 h-16 rounded-full flex 
        items-center justify-center mx-auto mb-4">
        <i class="fa-solid fa-check text-green-600 text-2xl"></i>
      </div>
      <h3 class="text-gray-800 font-bold text-xl mb-2">
        Transaksi Berhasil!</h3>
      <p id="infoTransaksi" 
        class="text-gray-500 text-sm mb-2"></p>
      <p id="infoTotal" 
        class="text-green-600 font-bold text-xl mb-5"></p>
      <div class="flex gap-3">
        <button onclick="cetakStruk()"
          class="btn btn-secondary flex-1">
          <i class="fa-solid fa-print"></i>
          Cetak Struk
        </button>
        <button onclick="selesai()"
          class="btn btn-primary flex-1">
          <i class="fa-solid fa-plus"></i>
          Transaksi Baru
        </button>
      </div>
    </div>
  </div>

  <!-- Modal Produk Manager -->
  <div id="modalProduk" class="hidden modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-gray-800 font-bold text-lg">
          Manajemen Produk</h3>
        <button onclick="hideProdukManager()"
          class="text-gray-400 hover:text-gray-600 w-8 h-8 
          flex items-center justify-center rounded-lg 
          hover:bg-gray-100">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <button onclick="showFormProduk()"
        class="btn btn-primary w-full justify-center mb-4">
        <i class="fa-solid fa-plus"></i>
        Tambah Produk Baru
      </button>

      <div id="listProdukManager" class="space-y-2 
        max-h-64 overflow-y-auto"></div>
    </div>
  </div>

  <!-- Modal Form Produk -->
  <div id="modalFormProduk" class="hidden modal-overlay">
    <div class="modal-box">
      <div class="flex items-center justify-between mb-4">
        <h3 class="text-gray-800 font-bold text-lg">
          Tambah Produk</h3>
        <button onclick="hideFormProduk()"
          class="text-gray-400 hover:text-gray-600 w-8 h-8 
          flex items-center justify-center rounded-lg 
          hover:bg-gray-100">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="space-y-3">
        <div>
          <label class="text-gray-600 text-sm font-medium 
            mb-1 block">Kode Produk *</label>
          <input id="fp_kode" type="text"
            placeholder="PRD-001" class="input"/>
        </div>
        <div>
          <label class="text-gray-600 text-sm font-medium 
            mb-1 block">Nama Produk *</label>
          <input id="fp_nama" type="text"
            placeholder="Nama produk" class="input"/>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-gray-600 text-sm font-medium 
              mb-1 block">Harga Beli</label>
            <input id="fp_harga_beli" type="number"
              placeholder="0" class="input"/>
          </div>
          <div>
            <label class="text-gray-600 text-sm font-medium 
              mb-1 block">Harga Jual *</label>
            <input id="fp_harga_jual" type="number"
              placeholder="0" class="input"/>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="text-gray-600 text-sm font-medium 
              mb-1 block">Stok</label>
            <input id="fp_stok" type="number"
              placeholder="0" class="input"/>
          </div>
          <div>
            <label class="text-gray-600 text-sm font-medium 
              mb-1 block">Satuan</label>
            <input id="fp_satuan" type="text"
              placeholder="pcs" class="input"/>
          </div>
        </div>
      </div>

      <div class="flex gap-3 mt-4">
        <button onclick="hideFormProduk()"
          class="btn btn-secondary flex-1">Batal</button>
        <button onclick="simpanProduk()" id="btnSimpanProduk"
          class="btn btn-primary flex-1">
          <i class="fa-solid fa-floppy-disk"></i>
          Simpan
        </button>
      </div>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/helper.js"></script>
  <script src="../components/sidebar.js"></script>
  <script src="../components/navbar.js"></script>

  <script>
    Auth.check()

    document.getElementById('sidebar').innerHTML =
      renderSidebar('toko')
    document.getElementById('navbar').innerHTML =
      renderNavbar('ePOS Toko', 'toko')
    startClock()

    const user = Auth.getUser()
    let produkList = []
    let keranjang = []
    let lastTransaksi = null

    async function loadMenu() {
  try {
    // Load anggota untuk dropdown
    const dataA = await Helper.fetch('/api/anggota')
    const anggota = dataA.data || []
    const sel = document.getElementById('selectMember')
    anggota.forEach(a => {
      sel.innerHTML += `
        <option value="${a.id}">
          ${a.nama} — ${a.no_anggota}
        </option>`
    })

    // Load menu dari API
    const dataM = await Helper.fetch(
      '/api/produk?modul=kantin&status=aktif')
    menuList = dataM.data || []
    renderMenu(menuList)

  } catch {
    Helper.toast('Gagal memuat menu!', 'error')
  }
    }

    function renderProduk(list) {
      const el = document.getElementById('gridProduk')
      if (!list.length) {
        el.innerHTML = `
          <div class="col-span-2 md:col-span-3 card p-6 
            text-center">
            <i class="fa-solid fa-box-open text-gray-300 
              text-2xl mb-2"></i>
            <p class="text-gray-400 text-sm">
              Tidak ada produk</p>
          </div>`
        return
      }
      el.innerHTML = list.map(p => `
        <div onclick="tambahKeranjang(${p.id})"
          class="card p-3 cursor-pointer active:scale-95 
          transition group">
          <div class="bg-yellow-100 group-hover:bg-yellow-200 
            w-10 h-10 rounded-xl flex items-center 
            justify-center mb-2 transition">
            <i class="fa-solid fa-box text-yellow-600"></i>
          </div>
          <div class="text-gray-800 text-sm font-semibold 
            leading-tight">${p.nama_produk}</div>
          <div class="text-green-600 font-bold text-sm mt-1">
            ${Helper.rupiah(p.harga_jual)}</div>
          <div class="text-gray-400 text-xs mt-0.5">
            Stok: ${p.stok} ${p.satuan}</div>
        </div>
      `).join('')
    }

    function filterProduk() {
      const q = document.getElementById('searchProduk')
        .value.toLowerCase()
      renderProduk(produkList.filter(p =>
        p.nama_produk.toLowerCase().includes(q) ||
        p.kode_produk.toLowerCase().includes(q)))
    }

    function tambahKeranjang(id) {
      const p = produkList.find(x => x.id === id)
      const existing = keranjang.find(k => k.id === id)
      if (existing) {
        if (existing.jumlah >= p.stok) {
          Helper.toast('Stok tidak cukup!', 'error')
          return
        }
        existing.jumlah++
      } else {
        keranjang.push({ ...p, jumlah: 1 })
      }
      updateKeranjang()
      Helper.toast(`${p.nama_produk} ditambahkan`, 'success')
    }

    function kurangi(id) {
      const idx = keranjang.findIndex(k => k.id === id)
      if (idx === -1) return
      keranjang[idx].jumlah--
      if (keranjang[idx].jumlah === 0) keranjang.splice(idx, 1)
      updateKeranjang()
    }

    function tambah(id) {
      tambahKeranjang(id)
    }

    function hapusItem(id) {
      keranjang = keranjang.filter(k => k.id !== id)
      updateKeranjang()
    }

    function clearKeranjang() {
      keranjang = []
      updateKeranjang()
    }

    function updateKeranjang() {
      const total = keranjang.reduce((s, k) =>
        s + (k.harga_jual * k.jumlah), 0)
      const count = keranjang.reduce((s, k) => s + k.jumlah, 0)

      const badge = document.getElementById('badgeKeranjang')
      if (count > 0) {
        badge.textContent = count
        badge.classList.remove('hidden')
      } else {
        badge.classList.add('hidden')
      }

      document.getElementById('subtotal').textContent =
        Helper.rupiah(total)

      const sec = document.getElementById('sectionTotal')
      const list = document.getElementById('listKeranjang')

      if (!keranjang.length) {
        sec.classList.add('hidden')
        list.innerHTML = `
          <div class="text-center py-6">
            <i class="fa-solid fa-cart-shopping 
              text-gray-200 text-3xl mb-2"></i>
            <p class="text-gray-400 text-sm">Keranjang kosong</p>
          </div>`
        return
      }

      sec.classList.remove('hidden')
      list.innerHTML = keranjang.map(k => `
        <div class="flex items-center gap-2 py-2 
          border-b border-gray-50">
          <div class="flex-1 min-w-0">
            <div class="text-gray-800 text-sm font-medium 
              truncate">${k.nama_produk}</div>
            <div class="text-green-600 text-xs">
              ${Helper.rupiah(k.harga_jual)}</div>
          </div>
          <div class="flex items-center gap-1">
            <button onclick="kurangi(${k.id})"
              class="w-6 h-6 bg-gray-100 hover:bg-red-100 
              text-gray-600 hover:text-red-600 rounded-lg 
              text-xs flex items-center justify-center">
              <i class="fa-solid fa-minus"></i>
            </button>
            <span class="text-gray-800 text-sm font-semibold 
              w-6 text-center">${k.jumlah}</span>
            <button onclick="tambah(${k.id})"
              class="w-6 h-6 bg-gray-100 hover:bg-green-100 
              text-gray-600 hover:text-green-600 rounded-lg 
              text-xs flex items-center justify-center">
              <i class="fa-solid fa-plus"></i>
            </button>
            <button onclick="hapusItem(${k.id})"
              class="w-6 h-6 hover:bg-red-100 text-gray-300 
              hover:text-red-500 rounded-lg text-xs flex 
              items-center justify-center ml-1">
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>
        </div>
      `).join('')
    }

    async function prosesTransaksi() {
      if (!keranjang.length) return
      const btn = document.getElementById('btnProses')
      const total = keranjang.reduce((s, k) =>
        s + (k.harga_jual * k.jumlah), 0)

      btn.innerHTML = 
        '<i class="fa-solid fa-spinner fa-spin"></i> Proses...'
      btn.disabled = true

      try {
        const data = await Helper.fetch('/api/transaksi', {
          method: 'POST',
          body: JSON.stringify({
            kasir_id: user.id,
            items: keranjang.map(k => ({
              produk_id: k.id,
              jumlah: k.jumlah,
              harga_satuan: k.harga_jual
            })),
            metode_bayar: document.getElementById('metodeBayar').value,
            modul: 'toko'
          })
        })

        if (data.success) {
          lastTransaksi = data.data
          document.getElementById('infoTransaksi').textContent =
            `No: ${data.data.no_transaksi}`
          document.getElementById('infoTotal').textContent =
            Helper.rupiah(total)
          document.getElementById('modalSukses')
            .classList.remove('hidden')
        } else {
          Helper.toast(data.message, 'error')
        }
      } catch {
        Helper.toast('Gagal terhubung ke server!', 'error')
      }

      btn.innerHTML =
        '<i class="fa-solid fa-check"></i> Proses Transaksi'
      btn.disabled = false
    }

    function selesai() {
      keranjang = []
      updateKeranjang()
      document.getElementById('modalSukses').classList.add('hidden')
    }

    function cetakStruk() {
      Helper.toast('Fitur cetak struk segera tersedia!', 'warning')
    }

    function showProdukManager() {
      const list = document.getElementById('listProdukManager')
      list.innerHTML = produkList.map(p => `
        <div class="flex items-center justify-between p-3 
          bg-gray-50 rounded-xl">
          <div>
            <div class="text-gray-800 text-sm font-medium">
              ${p.nama_produk}</div>
            <div class="text-gray-400 text-xs">
              ${Helper.rupiah(p.harga_jual)} • 
              Stok: ${p.stok}</div>
          </div>
          <button class="text-green-600 hover:text-green-700">
            <i class="fa-solid fa-pen text-sm"></i>
          </button>
        </div>
      `).join('')
      document.getElementById('modalProduk')
        .classList.remove('hidden')
    }

    function hideProdukManager() {
      document.getElementById('modalProduk').classList.add('hidden')
    }

    function showFormProduk() {
      hideProdukManager()
      document.getElementById('modalFormProduk')
        .classList.remove('hidden')
    }

    function hideFormProduk() {
      document.getElementById('modalFormProduk')
        .classList.add('hidden')
    }

    async function simpanProduk() {
      Helper.toast('Fitur segera tersedia!', 'warning')
      hideFormProduk()
    }

    loadProduk()
  </script>

</body>
</html>
