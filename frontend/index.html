<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Koperasi - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .gradient-bg {
      background: linear-gradient(135deg, #1E3A5F 0%, #2E86C1 50%, #1A5276 100%);
    }
    .card-shadow {
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .input-focus:focus {
      border-color: #2E86C1;
      box-shadow: 0 0 0 3px rgba(46,134,193,0.2);
    }
    .btn-primary {
      background: linear-gradient(135deg, #1E3A5F, #2E86C1);
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #2E86C1, #1E3A5F);
      transform: translateY(-1px);
      box-shadow: 0 8px 25px rgba(46,134,193,0.4);
    }
    .floating-label {
      transition: all 0.2s ease;
    }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">

  <!-- Background Pattern -->
  <div class="fixed inset-0 opacity-5" style="background-image: url('data:image/svg+xml,...')"></div>

  <div class="w-full max-w-md relative z-10">

    <!-- Logo & Header -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-20 h-20 
        bg-white bg-opacity-20 rounded-2xl mb-4 backdrop-blur-sm">
        <i class="fa-solid fa-building-columns text-white text-4xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-white mb-1">SisKop</h1>
      <p class="text-blue-200 text-sm">Sistem Manajemen Koperasi</p>
    </div>

    <!-- Card Login -->
    <div class="bg-white rounded-2xl card-shadow p-8">

      <h2 class="text-gray-800 font-semibold text-xl mb-1">Selamat Datang</h2>
      <p class="text-gray-400 text-sm mb-6">Masuk ke akun Anda untuk melanjutkan</p>

      <!-- Alert -->
      <div id="alert" class="hidden mb-4 p-3 rounded-xl text-sm 
        flex items-center gap-2"></div>

      <!-- Form -->
      <div class="space-y-4">

        <!-- Username -->
        <div>
          <label class="text-gray-600 text-sm font-medium mb-1 block">
            Username
          </label>
          <div class="relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 
              text-gray-400">
              <i class="fa-solid fa-user text-sm"></i>
            </div>
            <input id="username" type="text" 
              placeholder="Masukkan username"
              class="w-full border border-gray-200 rounded-xl 
              pl-10 pr-4 py-3 text-gray-800 input-focus 
              focus:outline-none transition bg-gray-50"/>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="text-gray-600 text-sm font-medium mb-1 block">
            Password
          </label>
          <div class="relative">
            <div class="absolute left-3 top-1/2 -translate-y-1/2 
              text-gray-400">
              <i class="fa-solid fa-lock text-sm"></i>
            </div>
            <input id="password" type="password" 
              placeholder="Masukkan password"
              class="w-full border border-gray-200 rounded-xl 
              pl-10 pr-12 py-3 text-gray-800 input-focus 
              focus:outline-none transition bg-gray-50"/>
            <button onclick="togglePassword()" 
              class="absolute right-3 top-1/2 -translate-y-1/2 
              text-gray-400 hover:text-gray-600">
              <i id="eyeIcon" class="fa-solid fa-eye text-sm"></i>
            </button>
          </div>
        </div>

        <!-- Button Login -->
        <button onclick="login()" id="btnLogin"
          class="btn-primary w-full text-white font-semibold 
          py-3 rounded-xl flex items-center justify-center gap-2">
          <i class="fa-solid fa-right-to-bracket"></i>
          <span>Masuk</span>
        </button>

      </div>

      <!-- Info Role -->
      <div class="mt-6 p-3 bg-blue-50 rounded-xl">
        <p class="text-blue-600 text-xs text-center">
          <i class="fa-solid fa-circle-info mr-1"></i>
          Hubungi Administrator jika lupa password
        </p>
      </div>

    </div>

    <!-- Footer -->
    <p class="text-center text-blue-200 text-xs mt-6">
      <i class="fa-solid fa-shield-halved mr-1"></i>
      BORNEO-TECH © 2026 — v1.0.0
    </p>

  </div>

  <script>
    const API = 'https://sistem-koperasi-production.up.railway.app';

    async function login() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');

      if (!username || !password) {
        showAlert('Username dan password wajib diisi!', 'error');
        return;
      }

      // Loading state
      btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> <span>Memproses...</span>';
      btn.disabled = true;

      try {
        const res = await fetch(`${API}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await res.json();

        if (data.success) {
          showAlert('Login berhasil! Mengalihkan...', 'success');
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          setTimeout(() => {
            window.location.href = 'dashboard.html';
          }, 800);
        } else {
          showAlert(data.message || 'Login gagal!', 'error');
          btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> <span>Masuk</span>';
          btn.disabled = false;
        }
      } catch {
        showAlert('Gagal terhubung ke server!', 'error');
        btn.innerHTML = '<i class="fa-solid fa-right-to-bracket"></i> <span>Masuk</span>';
        btn.disabled = false;
      }
    }

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.className = `mb-4 p-3 rounded-xl text-sm flex items-center gap-2 ${
        type === 'error'
          ? 'bg-red-50 text-red-600 border border-red-200'
          : 'bg-green-50 text-green-600 border border-green-200'
      }`;
      el.innerHTML = `
        <i class="fa-solid ${type === 'error' ? 'fa-circle-xmark' : 'fa-circle-check'}"></i>
        ${msg}
      `;
      el.classList.remove('hidden');
    }

    function togglePassword() {
      const input = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'fa-solid fa-eye-slash text-sm';
      } else {
        input.type = 'password';
        icon.className = 'fa-solid fa-eye text-sm';
      }
    }

    document.addEventListener('keypress', e => {
      if (e.key === 'Enter') login();
    });
  </script>

</body>
</html>
