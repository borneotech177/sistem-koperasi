<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laporan - Sistem Koperasi</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-gray-800 px-4 py-3 flex items-center gap-3">
    <button onclick="history.back()" 
      class="text-gray-400 hover:text-white text-xl">←</button>
    <span class="text-white font-bold">📊 Laporan</span>
  </nav>

  <div class="p-4 space-y-4">

    <!-- Filter Tanggal -->
    <div class="bg-gray-800 rounded-xl p-4">
      <h3 class="text-white font-semibold mb-3">Filter Laporan</h3>
      <div class="grid grid-cols-2 gap-3">
        <div>
          <label class="text-gray-400 text-xs">Dari Tanggal</label>
          <input id="tgl_dari" type="date"
            class="w-full bg-gray-700 text-white rounded-lg 
            px-3 py-2 mt-1 focus:outline-none text-sm"/>
        </div>
        <div>
          <label class="text-gray-400 text-xs">Sampai Tanggal</label>
          <input id="tgl_sampai" type="date"
            class="w-full bg-gray-700 text-white rounded-lg 
            px-3 py-2 mt-1 focus:outline-none text-sm"/>
        </div>
      </div>
      <button onclick="loadLaporan()"
        class="w-full bg-purple-600 hover:bg-purple-700 text-white 
        font-semibold py-2 rounded-xl mt-3">
        Tampilkan Laporan
      </button>
    </div>

    <!-- Ringkasan -->
    <div class="grid grid-cols-2 gap-3">
      <div class="bg-green-900 rounded-xl p-4">
        <div class="text-green-300 text-xs mb-1">Total Transaksi</div>
        <div id="totalTrx" class="text-white font-bold text-xl">-</div>
      </div>
      <div class="bg-blue-900 rounded-xl p-4">
        <div class="text-blue-300 text-xs mb-1">Total Pendapatan</div>
        <div id="totalPendapatan" class="text-white font-bold text-lg">-</div>
      </div>
      <div class="bg-yellow-900 rounded-xl p-4">
        <div class="text-yellow-300 text-xs mb-1">Transaksi Toko</div>
        <div id="totalToko" class="text-white font-bold text-xl">-</div>
      </div>
      <div class="bg-orange-900 rounded-xl p-4">
        <div class="text-orange-300 text-xs mb-1">Transaksi Kantin</div>
        <div id="totalKantin" class="text-white font-bold text-xl">-</div>
      </div>
    </div>

    <!-- List Transaksi -->
    <div class="bg-gray-800 rounded-xl p-4">
      <h3 class="text-white font-semibold mb-3">
        Riwayat Transaksi Terbaru</h3>
      <div id="listTrx" class="space-y-2">
        <div class="text-gray-400 text-center py-4 text-sm">
          Pilih tanggal dan klik Tampilkan</div>
      </div>
    </div>

    <!-- Anggota -->
    <div class="bg-gray-800 rounded-xl p-4">
      <h3 class="text-white font-semibold mb-3">📋 Statistik Anggota</h3>
      <div id="statAnggota" class="space-y-2">
        <div class="text-gray-400 text-sm text-center py-2">
          ⏳ Memuat...</div>
      </div>
    </div>

  </div>

  <script>
    const API = 'https://sistem-koperasi-production.up.railway.app';
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';

    // Set tanggal default hari ini
    const today = new Date().toISOString().split('T')[0];
    const firstDay = new Date(new Date().getFullYear(), 
      new Date().getMonth(), 1).toISOString().split('T')[0];
    document.getElementById('tgl_dari').value = firstDay;
    document.getElementById('tgl_sampai').value = today;

    async function loadLaporan() {
      try {
        // Load transaksi
        const res = await fetch(`${API}/api/transaksi?limit=20`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const trx = data.data || [];

        // Hitung statistik
        const totalPendapatan = trx.reduce((s, t) => 
          s + parseFloat(t.total_bayar || 0), 0);
        const toko = trx.filter(t => t.modul === 'toko').length;
        const kantin = trx.filter(t => t.modul === 'kantin').length;

        document.getElementById('totalTrx').textContent = trx.length;
        document.getElementById('totalPendapatan').textContent = 
          formatRp(totalPendapatan);
        document.getElementById('totalToko').textContent = toko;
        document.getElementById('totalKantin').textContent = kantin;

        // Render list
        if (!trx.length) {
          document.getElementById('listTrx').innerHTML = 
            '<div class="text-gray-400 text-center text-sm py-4">Tidak ada transaksi</div>';
        } else {
          document.getElementById('listTrx').innerHTML = 
            trx.map(t => `
              <div class="flex justify-between items-center 
                py-2 border-b border-gray-700">
                <div>
                  <div class="text-white text-sm">${t.no_transaksi}</div>
                  <div class="text-gray-400 text-xs">
                    ${new Date(t.tanggal).toLocaleDateString('id-ID')} 
                    • ${t.modul}</div>
                </div>
                <div class="text-green-400 font-semibold text-sm">
                  ${formatRp(t.total_bayar)}</div>
              </div>
            `).join('');
        }

      } catch(e) {
        document.getElementById('listTrx').innerHTML = 
          '<div class="text-red-400 text-center text-sm py-4">❌ Gagal memuat</div>';
      }
    }

    async function loadStatAnggota() {
      try {
        const res = await fetch(`${API}/api/anggota`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        const data = await res.json();
        const anggota = data.data || [];

        const aktif = anggota.filter(a => a.status === 'aktif').length;
        const nonaktif = anggota.filter(a => a.status === 'nonaktif').length;

        document.getElementById('statAnggota').innerHTML = `
          <div class="flex justify-between">
            <span class="text-gray-400 text-sm">Total Anggota</span>
            <span class="text-white font-semibold">${anggota.length}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400 text-sm">Anggota Aktif</span>
            <span class="text-green-400 font-semibold">${aktif}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-gray-400 text-sm">Anggota Nonaktif</span>
            <span class="text-red-400 font-semibold">${nonaktif}</span>
          </div>
        `;
      } catch {
        document.getElementById('statAnggota').innerHTML = 
          '<div class="text-red-400 text-sm text-center">❌ Gagal memuat</div>';
      }
    }

    function formatRp(n) {
      return 'Rp ' + Math.round(n).toLocaleString('id-ID');
    }

    loadStatAnggota();
  </script>

</body>
</html>
